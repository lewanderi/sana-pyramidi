<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanavuori</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header id="main-header">
        <h1>Sanavuori</h1>
    </header>

    <div id="choice-screen">
      <p>Valitse pelimuoto</p>
      <div class="choice-buttons">
          <button id="example-btn">Päivän haaste</button>
          <button id="custom-btn">Luo oma</button>
          <hr class="choice-divider">
          <button id="library-btn" onclick="window.location.href='library.html'">Kirjasto📚</button>
      </div>
    </div>

   <div id="setup-screen" style="display:none;">
    <h2>Luo oma</h2>
    <p class="setup-subtitle">Lisää kategoria ja sanat</p>

    <div class="setup-categories">
        <div class="setup-category">
            <div class="chip-row" data-size="5">
                <input type="text" class="category-label" placeholder="Lentäviä asioita">
                <input type="text" class="chip-input" placeholder="kotka">
                <input type="text" class="chip-input" placeholder="leija">
                <input type="text" class="chip-input" placeholder="lentokone">
                <input type="text" class="chip-input" placeholder="frisbee">
                <input type="text" class="chip-input" placeholder="perhonen">
            </div>
        </div>
        <div class="setup-category">
            <input type="text" class="category-label" placeholder="Kategoria...">
            <div class="chip-row" data-size="4">
                <input type="text" class="chip-input" placeholder="sana">
                <input type="text" class="chip-input" placeholder="sana">
                <input type="text" class="chip-input" placeholder="sana">
                <input type="text" class="chip-input" placeholder="sana">
            </div>
        </div>
        <div class="setup-category">
            <input type="text" class="category-label" placeholder="Kategoria...">
            <div class="chip-row" data-size="3">
                <input type="text" class="chip-input" placeholder="sana">
                <input type="text" class="chip-input" placeholder="sana">
                <input type="text" class="chip-input" placeholder="sana">
            </div>
        </div>
        <div class="setup-category">
            <input type="text" class="category-label" placeholder="Kategoria...">
            <div class="chip-row" data-size="2">
                <input type="text" class="chip-input" placeholder="sana">
                <input type="text" class="chip-input" placeholder="sana">
            </div>
        </div>

    <div class="setup-lone">
        <p class="lone-label">Yksinäinen</p>
        <input type="text" id="lone-word-input" placeholder="sana">
    </div>

    <p id="validation-msg" style="color:red; display:none;"></p>
    <div class="setup-publish">
        <input type="text" id="puzzle-name-input" placeholder="Vuoren nimi (valinnainen)">
        <label class="toggle-label">
            <input type="checkbox" id="is-public-toggle">
            <span>Julkinen</span>
        </label>
    </div>

    <button id="generate-btn">Luo vuori</button>
</div>
</div>

    <div id="loading" style="display:none;">
        <div class="spinner"></div>
        <p id="loading-text"></p>
    </div>
    <div id="game" style="display:none;">
        <h2 id="instruction">Valitse yhteenkuuluvat sanat</h2>
        <div id="pyramid">
        </div>
      <div id="overlay" style="display:none;">
        <h2 id="overlay-title"></h2>
        <p id="overlay-message"></p>
        <button id="overlay-btn">Pelaa uudestaan</button>
        <button id="overlay-home-btn">Koti</button>
        <button id="overlay-create-btn">Luo oma</button>
        <button id="overlay-view-btn">Näytä ratkaisu</button>
      </div>
      <div id="mistakes">
        <div id="dots">
          <span class="dot" id="dot1">❤️</span>
          <span class="dot" id="dot2">❤️</span>
          <span class="dot" id="dot3">❤️</span>
          <span class="dot" id="dot4">❤️</span>
        </div>
      </div>
      <div class="buttons">
          <button id="check-btn">Tarkista</button>
          <button id="clear-btn">Tyhjennä</button>
          <button id="hint-btn">Vihje</button>
      </div>
    </div>
    <button id="back-btn" style="visibility:hidden;">⬅️Takaisin</button>
    <div id="share-section" style="display:none;">
        <button id="copy-btn">Jaa 🔗</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
